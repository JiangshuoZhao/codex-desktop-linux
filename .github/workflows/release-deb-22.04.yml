name: Release Debian Package (Ubuntu 22.04)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

# Release packaging is not safe to run concurrently with itself; a release
# should only be published once and the DMG cache write is not cancel-safe.
concurrency:
  group: release-deb-22-04-${{ github.event.release.id || github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UPSTREAM_DMG_URL: https://persistent.oaistatic.com/codex-app-prod/ChatGPT.dmg
  UPSTREAM_DMG_PATH: /tmp/codex-upstream-ci/Codex.dmg
  DMG_CACHE_SCHEMA_VERSION: v1

jobs:
  build-deb-22-04:
    name: Build and publish Debian package (Ubuntu 22.04)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        # The ubuntu:22.04 container defaults its shell to /bin/sh (dash),
        # which does not support `set -o pipefail`. Force bash so all the
        # `set -euo pipefail` steps below work inside the container.
        shell: bash

    container:
      # Ubuntu 22.04 (jammy) ships GCC 11, which natively accepts the
      # -std=c++20 flag that native modules such as better-sqlite3 pass to
      # node-gyp. NOTE: building here links binaries against glibc 2.35, so
      # the resulting .deb requires Ubuntu 22.04+ and intentionally does NOT
      # support Ubuntu 20.04. The companion release-deb.yml builds on 20.04
      # for the broader 20.04+ audience.
      image: docker.io/library/ubuntu:22.04
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap sudo
        run: |
          set -euo pipefail
          apt-get update -qq

          # Pre-seed tzdata so it never opens the interactive timezone menu
          # when pulled in as a dependency (e.g. by build-essential). Set a
          # concrete zone + preseed debconf; this is honored even if a step
          # falls back to a readline frontend.
          ln -fs /usr/share/zoneinfo/Etc/UTC /etc/localtime
          echo 'tzdata tzdata/Areas select Etc' | debconf-set-selections
          echo 'tzdata tzdata/Zones/Etc select UTC' | debconf-set-selections

          apt-get install -y sudo ca-certificates tzdata

          # sudo resets the environment by default (env_reset), which drops the
          # job-level DEBIAN_FRONTEND=noninteractive. install-deps.sh runs apt
          # through sudo, so keep the var so the whole build stays noninteractive.
          echo 'Defaults env_keep += "DEBIAN_FRONTEND"' > /etc/sudoers.d/keep-debian-frontend
          chmod 0440 /etc/sudoers.d/keep-debian-frontend

          # Ubuntu 22.04 already ships GCC 11, which supports -std=c++20, so no
          # extra compiler install is needed here (contrast with the 20.04 job,
          # which installs GCC 10 from the toolchain PPA). Verify it explicitly.
          gcc --version | head -1

      - name: Install build dependencies
        run: bash scripts/install-deps.sh

      - name: Expose local tooling on PATH
        run: |
          printf '%s\n' "$HOME/.local/bin" >> "$GITHUB_PATH"
          printf '%s\n' "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Capture upstream DMG metadata
        id: upstream-metadata
        run: |
          set -euo pipefail

          headers_file="$(mktemp)"
          trap 'rm -f "$headers_file"' EXIT

          curl -fsSLI "$UPSTREAM_DMG_URL" > "$headers_file"

          # Match header names case-insensitively without gawk's IGNORECASE,
          # which is a no-op under mawk (the default awk on ubuntu runners).
          last_modified="$(awk 'tolower($0) ~ /^last-modified:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"
          etag="$(awk 'tolower($0) ~ /^etag:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); gsub(/"/,""); print; exit}' "$headers_file")"
          content_length="$(awk 'tolower($0) ~ /^content-length:/ {sub(/\r$/,""); sub(/^[^:]+: /,""); print; exit}' "$headers_file")"

          if [ -z "$last_modified" ]; then
            last_modified="unknown"
          fi
          if [ -z "$etag" ]; then
            etag="no-etag"
          fi
          if [ -z "$content_length" ]; then
            content_length="unknown"
          fi

          cache_segment="$(printf '%s|%s|%s\n' "$last_modified" "$etag" "$content_length" | sha256sum | cut -d' ' -f1)"

          {
            echo "last_modified=$last_modified"
            echo "etag=$etag"
            echo "content_length=$content_length"
            echo "cache_segment=$cache_segment"
          } >> "$GITHUB_OUTPUT"

      - name: Restore cached upstream DMG
        id: dmg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codex-upstream-ci/Codex.dmg
          key: upstream-dmg-${{ env.DMG_CACHE_SCHEMA_VERSION }}-${{ steps.upstream-metadata.outputs.cache_segment }}

      - name: Download upstream DMG
        if: steps.dmg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$UPSTREAM_DMG_PATH")"
          curl -fL --retry 3 -o "$UPSTREAM_DMG_PATH" "$UPSTREAM_DMG_URL"

      - name: Build app from upstream DMG
        env:
          # Honor the shared upstream-DMG acceptance profile: if the current
          # upstream DMG drifts and the transactional installer rejects it, the
          # job fails here and no .deb is published.
          CODEX_ACCEPTANCE_OVERRIDE: '0'
          CODEX_ACCEPTANCE_SOURCE: github-actions
        run: make build-app DMG=/tmp/codex-upstream-ci/Codex.dmg

      - name: Build codex-update-manager
        # Explicit, separately-failing step so a Rust/cargo build failure is
        # attributed here instead of being buried inside the packaging step.
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          make build-updater

      - name: Resolve package version
        id: version
        run: |
          set -euo pipefail
          raw="${{ github.event.release.tag_name }}"
          if [ -z "$raw" ]; then
            raw="ci-$(date -u +%Y.%m.%d.%H%M%S)"
          fi
          # Strip a leading v and any characters not valid in a dpkg version.
          version="$(printf '%s' "$raw" | sed -E 's/^v//; s/[^0-9A-Za-z.+~-]//g')"
          test -n "$version"
          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Debian package
        id: deb
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          # `make deb` depends on `maybe-build-updater`; the updater was already
          # built in the step above, so this is effectively the packaging step.
          make deb

          deb_file="$(find dist -maxdepth 1 -name 'codex-desktop_*.deb' -print -quit)"
          test -n "$deb_file"

          # Disambiguate from the 20.04-built asset on the same Release by
          # suffixing the package base name with -22.04.
          renamed="$(printf '%s' "$deb_file" | sed 's#^dist/codex-desktop_#dist/codex-desktop-22.04_#')"
          mv "$deb_file" "$renamed"

          echo "path=$renamed" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$renamed")" >> "$GITHUB_OUTPUT"

          dpkg-deb -I "$renamed"
          dpkg-deb -c "$renamed" | tee /tmp/deb-contents.txt >/dev/null
          grep -q './usr/bin/codex-update-manager' /tmp/deb-contents.txt
          grep -q './usr/lib/systemd/user/codex-update-manager.service' /tmp/deb-contents.txt
          grep -q './opt/codex-desktop/update-builder/install.sh' /tmp/deb-contents.txt
          grep -q './opt/codex-desktop/.codex-linux/codex-packaged-runtime.sh' /tmp/deb-contents.txt

      - name: Upload .deb to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.path }}
          fail_on_unmatched_files: true

      - name: Upload .deb as workflow artifact (manual trigger only)
        # When run via workflow_dispatch there is no Release to attach to, so
        # keep the .deb as a downloadable artifact for 30 days instead.
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb.outputs.name }}
          path: ${{ steps.deb.outputs.path }}
          retention-days: 30

      - name: Write release summary
        run: |
          {
            echo "## Release Debian Package (Ubuntu 22.04)"
            echo ""
            echo "- Built and published: \`${{ steps.deb.outputs.name }}\`"
            echo "- Requires Ubuntu 22.04+ (glibc 2.35); does NOT support 20.04."
            echo "- Verified updater binary, user service, update-builder bundle, and packaged runtime helper."
          } >> "$GITHUB_STEP_SUMMARY"
